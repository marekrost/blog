---
layout: default
---
<div class="post-list">
  {% for post in site.posts %}
  <article class="post-summary">
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %d, %Y" }}</time>
    {% if post.excerpt %}
    <p>{{ post.excerpt | strip_html }}</p>
    {% endif %}
  </article>
  {% endfor %}
</div>
